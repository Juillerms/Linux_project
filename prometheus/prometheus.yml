global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: sports-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - app1:8000
          - app2:8000
        labels:
          service: sports-api
