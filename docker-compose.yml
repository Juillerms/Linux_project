services:
  db:
    image: postgres:16-alpine
    container_name: sports-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sports
      POSTGRES_PASSWORD: sports
      POSTGRES_DB: sportsdb
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports -d sportsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app1:
    build:
      context: ./app
    container_name: sports-app1
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sports:sports@db:5432/sportsdb
      INSTANCE_NAME: app1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app2:
    build:
      context: ./app
    container_name: sports-app2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sports:sports@db:5432/sportsdb
      INSTANCE_NAME: app2
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: sports-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      grafana:
        condition: service_started
      prometheus:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: sports-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.route-prefix=/prometheus
      - --web.external-url=http://localhost:8080/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/prometheus/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: sports-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge
    name: sports-internal
